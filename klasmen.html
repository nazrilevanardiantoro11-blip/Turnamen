<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klasemen Sementara</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    min-height:200vh; /* Membuat halaman lebih panjang */
    padding:40px;
}

h1{
    text-align:center;
    font-size:48px;
    color:#1f3c88;
    margin-bottom:40px;
}

table{
    width:100%;
    max-width:1000px;
    margin:auto;
    border-collapse:collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

th{
    background:#1f3c88;
    color:white;
    padding:15px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:nth-child(even){
    background:#f2f2f2;
}

tr:hover{
    background:#eaf2ff;
}

/* Ruang kosong agar halaman bisa di-scroll */
.spacer{
    height:800px;
}
</style>
</head>
<body>

<h1>KLASEMEN SEMENTARA TURNAMEN</h1>

<table>
    <tr>
        <th>Posisi</th>
        <th>Tim</th>
        <th>Poin</th>
        <th>Menang</th>
        <th>Kalah</th>
        <th>Diskualifikasi</th>
    </tr>

    <tr><td>1</td><td>Tim A</td><td>1</td><td>0</td><td>0</td><td>0</td></tr>
    
    
    <tr><td>2</td><td>Tim B</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
    
    
    <tr><td>3</td><td>Tim C</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
    
    
    <tr><td>4</td><td>Tim D</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
    
    
    <tr><td>5</td><td>Tim E</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
    
    <tr><td>6</td><td>Tim F</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
    <tr><td>7</td><td>Tim G</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
    <tr><td>8</td><td>Tim H</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
</table>

<div class="spacer"></div>

</body>
</html>
